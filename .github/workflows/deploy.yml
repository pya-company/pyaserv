name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Clone the platform sibling so bun overrides (file:../pya-platform/...) resolve.
      - run: git clone --depth 1 https://github.com/pya-company/pya-platform.git ../pya-platform
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      # pyaserv.com is the custom domain (see /CNAME), so site lives at root.
      - run: bun run build:site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/site/dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
