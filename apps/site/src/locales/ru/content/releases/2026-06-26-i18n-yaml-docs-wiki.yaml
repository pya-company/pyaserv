title: Четыре языка, новая документация и более стабильное демо
tldr: Испанский · английский · немецкий · русский, все на равных. Документация в виде вики с боковой панелью. У каждого релиза своя полноценная страница. Демо-режим починен и держится лучше.
sections:
  - kind: new
    heading: Четыре языка — все на равных
    body: |
      Переключайтесь между испанским, английским, немецким и русским из переключателя в верхней панели. Ваш выбор запоминается между страницами и при возврате. Сделано для экспат-сообщества в Парагвае, не только для местных.
  - kind: new
    heading: Автоматическое определение языка браузера
    body: |
      Если вы заходите с браузером на немецком или русском, приложение открывается уже на вашем языке. Никаких ручных шагов. Поменять можно в любой момент через переключатель.
  - kind: new
    heading: Документация как вики
    body: |
      `/docs/` теперь — вики с боковой навигацией слева. Категории: Профиль и видимость · Геймификация · Инструменты · Система · Дорожная карта. Находите нужное быстрее, чем раньше.
  - kind: new
    heading: У каждого релиза своя страница
    body: |
      У каждой новинки своя ссылка, которой можно поделиться, — копируете `/releases/<имя>/` и отправляете в WhatsApp, чтобы точно показать, что изменилось. Индексируется в Google.
  - kind: fixed
    heading: Демо-режим — баннер, который действительно закрывается
    body: |
      Кнопка "Выйти из демо" теперь работает. Пока вы ходите в демо-режиме, ссылки на страницы, поддерживающие демо, сохраняют его автоматически.
  - kind: next
    heading: Скоро
    body: |
      Поиск по документации. Уведомление о новостях с момента вашего последнего визита. Короткие встроенные записи в релиз-ноутах, чтобы увидеть новые функции в деле.
