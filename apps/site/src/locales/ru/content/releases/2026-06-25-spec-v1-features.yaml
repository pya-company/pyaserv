title: 13 функций, которых вам не хватало — публичный профиль, калькулятор смет, демо и не только
tldr: Профиль, которым удобно делиться в WhatsApp, сметы с PDF, лёгкий CRM клиентов, обзорный тур, гиперлокальный поиск и демо-режим, чтобы посмотреть до регистрации.
sections:
  - kind: new
    heading: Публичный профиль, готовый к шарингу
    body: |
      У каждого мастера есть свой адрес `/p/ваше-имя` с фото, обложкой, био, услугами, значками, расписанием и кнопкой WhatsApp. Вставляете ссылку в группу WhatsApp — и клиент видит всё одним касанием.
  - kind: new
    heading: Калькулятор смет с PDF в одно касание
    body: |
      Собираете смету с позициями и IVA, скачиваете PDF и отправляете клиенту прямо в WhatsApp. Без возврата за компьютер.
  - kind: new
    heading: Растёте в уровне, пока работаете
    body: |
      XP за каждый завершённый заказ, значки за вехи, ежедневный стрик, который держится, даже если вы взяли выходной. Пять уровней — от подмастерья до патрона. Клиент видит уровень в вашем профиле.
  - kind: new
    heading: Ваши клиенты под рукой
    body: |
      Когда вы завершаете заказ, клиент сохраняется в "Мои клиенты". Заметки, которые можно править, счётчик заказов. Скоро: автоматическое напоминание, чтобы предложить обслуживание.
  - kind: new
    heading: Обзорный тур при первом входе
    body: |
      Если вы только что создали профиль, мы проводим вас шаг за шагом по тому, что осталось заполнить, — без чтения инструкций. Тур закрывается сам, когда вы уже всё освоили.
  - kind: new
    heading: 400 локальных страниц, чтобы вас находили в Google
    body: |
      Автоматически генерируем по странице на каждую специальность и район — "Сантехники в Villa Morra", "Электрики в Lambaré", — чтобы при поиске в Google клиент находил вас первым.
  - kind: new
    heading: Демо-режим — смотрите до регистрации
    body: |
      Добавьте `?demo=1` к любой ссылке и пройдите всё приложение с образцами данных, без регистрации. На случай, когда вы пришли из группы WhatsApp и хотите понять, о чём речь.
