title: Spec v1 Foundation — схема + service areas + база геймификации
tldr: База данных готова для всех фич spec v1. 4 миграции применены к prod D1.
sections:
  - kind: new
    heading: Миграции
    body: |
      · **0009** — extensions `specialist_profiles` (slug, cover, services_json, portfolio_json, schedule_json, lead_filters_json, cedula_verified, ruc_number, bio_gn, headline_gn).
      · **0010** — таблицы геймификации (user_game_state, xp_events, badges_catalog с 18 seeded, user_badges, quests).
      · **0011** — user_tours_completed + slug backfill для существующих профилей.
      · **0012** — quotes, quote_templates, client_records, release_subscriptions, user_subscriptions.
  - kind: new
    heading: Canonical service areas
    body: |
      · 40 зон seeded: 25 районов Asunción + 15 distritos Departamento Central.
      · Таблица `service_areas` (canonical) + link `specialist_service_areas` (many-to-many, до 8 зон на профи).
  - kind: new
    heading: Базовая система геймификации
    body: |
      · Event-sourced: каждый XP grant — неизменяемая row в `xp_events`.
      · Materialization: `user_game_state` с денормализованной projection для быстрых HUD reads.
      · 18 badges seeded в 4 категориях (tier · milestone · superlative · collection).
  - kind: new
    heading: Гуарани (sparse)
    body: |
      · Locale type расширен до `'es' | 'en' | 'gn'`.
      · GN sparse dictionary, ES fallback для отсутствующих keys.
      · Per-specialist: bio_gn, headline_gn опционально.
