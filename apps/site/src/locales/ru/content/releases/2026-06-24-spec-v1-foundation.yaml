title: PyaServ открывает двери — 40 зон, геймификация и гуарани
tldr: Подбираем мастеров по районам Асунсьона и Departamento Central. Зарабатываете XP и значки за хорошую работу. И да, гуарани здесь тоже в деле.
sections:
  - kind: new
    heading: Ищите по своему району
    body: |
      Выбирайте из 40 зон — 25 районов Асунсьона плюс 15 округов Departamento Central. Фильтруете мастеров, которые рядом с вами, а не в часе езды.
  - kind: new
    heading: Покрывайте до 8 зон
    body: |
      Если вы работаете как мастер, отметьте до 8 зон, куда выезжаете. Клиенты видят вас только тогда, когда ищут в зоне, которую вы покрываете, — никакой потери времени на заказы, до которых далеко.
  - kind: new
    heading: Растёте в уровне, пока работаете
    body: |
      За каждый завершённый заказ, каждый отзыв с фото, каждый быстрый ответ — вы набираете XP. Пять уровней роста: подмастерье · специалист · мастер · главный мастер · патрон. Уровень показан в вашем публичном профиле.
  - kind: new
    heading: 18 значков, чтобы выделиться
    body: |
      Получаете медали за заметные вехи: "Быстрый ответ", "10 завершённых заказов", "Топ в вашем районе". Они появляются в профиле и отличают вас от конкурентов.
  - kind: new
    heading: Также на гуарани
    body: |
      По желанию у вашей биографии и заголовка может быть версия на гуарани. Клиенты, которые предпочитают гуарани, читают вас на своём языке. Опционально — заполняйте, только если это вам в плюс.
