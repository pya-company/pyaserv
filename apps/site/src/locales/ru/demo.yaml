demo:
  banner_msg: 'РЕЖИМ ДЕМО — изменения не сохраняются. Вы видите реальное приложение с тестовыми данными.'
  banner_exit: Выйти из демо
  exit_confirm_title: Выйти из режима демо
  exit_confirm_body: Ничего из того, что вы попробовали, не сохранится. Ваш реальный профиль (если есть) останется как был.
  exit_confirm_yes: Да, выйти
  exit_confirm_no: Остаться в демо
  demo_tag: Демо
  
  tour_t1_step1_title: Начнём с фото
  tour_t1_step1_body: Хорошее фото удваивает заявки. Снимите при дневном свете.
  tour_t1_step2_title: Ваш заголовок
  tour_t1_step2_body: 'Одна короткая строка: профессия + район + преимущество. Напр.: «Сантехник 24/7 в Villa Morra».'
  tour_t1_step3_title: Расскажите о себе
  tour_t1_step3_body: 2-3 предложения. Ваш опыт, инструменты, районы которые покрываете.
  tour_t1_step4_title: Ваш телефон
  tour_t1_step4_body: Как клиенты связываются. По возможности — тот же что и WhatsApp.
  tour_t1_step5_title: WhatsApp
  tour_t1_step5_body: Главная кнопка профиля ведёт сюда. Держите номер актуальным.
  tour_t1_step6_title: Основной район
  tour_t1_step6_body: Где у вас больше всего работы. Дополнительные районы добавите позже.
  tour_t1_step7_title: Готово!
  tour_t1_step7_body: Каждый шаг повышает вашу видимость. На 100% открываются 7 дней Boost и значок «Master Profile»!

  # Auto-tours per page
  tour_home_step1_title: "Добро пожаловать в PyaServ"
  tour_home_step1_body: "Связываем специалистов и клиентов по всему Парагваю. Без платы за контакты."
  tour_home_step2_title: "Четыре языка — выбирайте"
  tour_home_step2_body: "Переключайтесь между испанским, английским, немецким и русским через меню в любой момент."
  tour_home_step3_title: "Вы в демо-режиме"
  tour_home_step3_body: "Вы видите тестовые данные. Нажмите «Выйти из демо», когда захотите начать по-настоящему."
  tour_specialists_step1_title: "Фильтр по району или категории"
  tour_specialists_step1_body: "Найдите специалистов рядом. Асунсьон и Departamento Central — 40 зон на выбор."
  tour_specialists_step2_title: "Нажмите на карточку, чтобы открыть профиль"
  tour_specialists_step2_body: "У каждого специалиста — фото, био, услуги и значки. Связь напрямую через WhatsApp."
  tour_specialists_step3_title: "Вы в демо-режиме"
  tour_specialists_step3_body: "Видимые специалисты — тестовые. Выйдите из демо, когда захотите искать по-настоящему."
  tour_clients_step1_title: "Открытые заявки по районам"
  tour_clients_step1_body: "Это клиенты, которые ищут специалиста прямо сейчас. Фильтруйте по району или категории."
  tour_clients_step2_title: "Нажмите на заявку, чтобы ответить"
  tour_clients_step2_body: "Если подходит — пишите клиенту напрямую. Без фильтров и платы за отклик."
  tour_clients_step3_title: "Вы в демо-режиме"
  tour_clients_step3_body: "Видимые заявки — тестовые. Выйдите из демо, когда захотите ответить по-настоящему."
  tour_profile_step1_title: "Публичный профиль готов к ссылке"
  tour_profile_step1_body: "Так клиенты видят вас, когда вы отправляете ссылку на PyaServ через WhatsApp."
  tour_profile_step2_title: "Прямой контакт через WhatsApp"
  tour_profile_step2_body: "Одно касание — и клиент пишет вам. Без промежуточных шагов, без форм."
  tour_profile_step3_title: "Услуги, био и значки"
  tour_profile_step3_body: "Всё, что нужно клиенту для решения. Настройте каждый раздел из своего кабинета."
