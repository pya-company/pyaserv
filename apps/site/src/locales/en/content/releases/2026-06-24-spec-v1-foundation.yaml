title: PyaServ opens its doors — 40 areas, gamification, and Guarani
tldr: Browse pros by neighborhood across Asunción and Departamento Central. Earn XP and badges for doing good work. And yes, Guarani is part of it too.
sections:
  - kind: new
    heading: Search by your area
    body: |
      Pick from 40 areas — the 25 neighborhoods of Asunción plus 15 districts of Departamento Central. Filter for pros who are nearby, not an hour away.
  - kind: new
    heading: Cover up to 8 areas
    body: |
      If you work as a pro, mark up to 8 areas you serve. Clients only see you when they search inside an area you cover — no time wasted on jobs that are too far.
  - kind: new
    heading: Level up as you work
    body: |
      Every finished job, every review with a photo, every quick reply — you earn XP. Five levels to climb: apprentice · journeyman · master · grand master · patron. Your level shows on your public profile.
  - kind: new
    heading: 18 badges to stand out
    body: |
      Earn medals for milestones your clients can see: "Quick reply", "10 jobs completed", "Top of your neighborhood". They show on your profile and set you apart from the competition.
  - kind: new
    heading: Also in Guarani
    body: |
      If you want, your bio and headline can have a Guarani version. Clients who prefer Guarani read you in their language. Optional — only fill it in if it helps you.
