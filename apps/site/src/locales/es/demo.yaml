demo:
  banner_msg: 'MODO DEMO — los cambios no se guardan. Estás viendo la app real con datos ficticios.'
  banner_exit: Salir del demo
  exit_confirm_title: Salir del modo demo
  exit_confirm_body: Nada de lo que probaste se guarda. Tu perfil real (si tenés uno) sigue exactamente como lo dejaste.
  exit_confirm_yes: Sí, salir
  exit_confirm_no: Seguir en demo
  demo_tag: Demo
  
  # Tour steps
  tour_t1_step1_title: Empezamos por tu cara
  tour_t1_step1_body: Una buena foto duplica las consultas. Sacate una con luz natural.
  tour_t1_step2_title: Tu headline
  tour_t1_step2_body: 'Una línea corta: oficio + zona + ventaja. Ej: "Plomero 24h en Villa Morra".'
  tour_t1_step3_title: Contales quién sos
  tour_t1_step3_body: 2-3 frases. Tu experiencia, herramientas, qué zonas cubrís.
  tour_t1_step4_title: Tu teléfono
  tour_t1_step4_body: Cómo te contactan. Usá el mismo que tu WhatsApp si es posible.
  tour_t1_step5_title: WhatsApp
  tour_t1_step5_body: El botón principal de tu perfil llevará acá. Asegurate de que esté actualizado.
  tour_t1_step6_title: Tu barrio principal
  tour_t1_step6_body: Donde tenés más trabajo. Después podés agregar más zonas en la edición avanzada.
  tour_t1_step7_title: ¡Listo!
  tour_t1_step7_body: Cada paso adicional sube tu visibilidad. ¡A 100% desbloqueás 7 días de Boost gratis y la insignia "Perfil Maestro"!

  # Auto-tours per page
  tour_home_step1_title: "Bienvenido a PyaServ"
  tour_home_step1_body: "Conectamos profesionales con clientes en Paraguay. Sin comisiones por contacto."
  tour_home_step2_title: "Cuatro idiomas, uno solo elegís"
  tour_home_step2_body: "Cambiá entre español, inglés, alemán o ruso desde la barra superior cuando quieras."
  tour_home_step3_title: "Estás en modo demo"
  tour_home_step3_body: "Estás navegando con datos de muestra. Tocá \"Salir del demo\" cuando quieras empezar de verdad."
  tour_specialists_step1_title: "Filtrá por barrio o categoría"
  tour_specialists_step1_body: "Encontrá profesionales cerca tuyo. Asunción y Departamento Central — 40 zonas listas."
  tour_specialists_step2_title: "Tocá una tarjeta para ver el perfil"
  tour_specialists_step2_body: "Cada profesional muestra foto, bio, servicios y badges. El contacto es directo por WhatsApp."
  tour_specialists_step3_title: "Estás en modo demo"
  tour_specialists_step3_body: "Los profesionales que ves acá son de muestra. Salí del demo cuando quieras buscar de verdad."
  tour_clients_step1_title: "Pedidos abiertos por zona"
  tour_clients_step1_body: "Acá ves los clientes que están buscando un profesional ahora mismo. Filtrá por barrio o categoría."
  tour_clients_step2_title: "Tocá un pedido para responder"
  tour_clients_step2_body: "Si encaja con lo tuyo, escribís directo al cliente. Sin filtros, sin pagar para postularte."
  tour_clients_step3_title: "Estás en modo demo"
  tour_clients_step3_body: "Los pedidos que ves son de muestra. Salí del demo cuando quieras responder de verdad."
  tour_profile_step1_title: "Perfil público listo para compartir"
  tour_profile_step1_body: "Así te ven los clientes cuando les pasás tu link de PyaServ por WhatsApp."
  tour_profile_step2_title: "Contacto directo por WhatsApp"
  tour_profile_step2_body: "Un toque y el cliente te escribe — sin pasos intermedios, sin formularios."
  tour_profile_step3_title: "Servicios, bio y badges"
  tour_profile_step3_body: "Toda la información que necesita el cliente para decidirse. Personalizá cada sección desde tu panel."
