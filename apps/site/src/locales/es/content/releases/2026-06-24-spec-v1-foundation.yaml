title: Spec v1 Foundation — schema + service areas + gamification base
tldr: Base de datos lista para todas las features de spec v1. 4 migraciones aplicadas en prod D1.
sections:
  - kind: new
    heading: Migraciones
    body: |
      · **0009** — extensions a `specialist_profiles` (slug, cover, services_json, portfolio_json, schedule_json, lead_filters_json, cedula_verified, ruc_number, bio_gn, headline_gn).
      · **0010** — tablas de gamification (user_game_state, xp_events, badges_catalog con 18 seeded, user_badges, quests).
      · **0011** — user_tours_completed + slug backfill para perfiles existentes.
      · **0012** — quotes, quote_templates, client_records, release_subscriptions, user_subscriptions.
  - kind: new
    heading: Service areas canonical
    body: |
      · 40 zonas seeded: 25 barrios de Asunción + 15 distritos de Departamento Central.
      · Tabla `service_areas` (canonical) + link `specialist_service_areas` (many-to-many, hasta 8 zonas por profesional).
  - kind: new
    heading: Sistema de gamification base
    body: |
      · Event-sourced: cada XP grant es row inmutable en `xp_events`.
      · Materialización: `user_game_state` con projection denormalizada para lectura rápida del HUD.
      · 18 badges seeded en 4 categorías (tier · milestone · superlative · collection).
  - kind: new
    heading: Idioma guaraní (sparse)
    body: |
      · Locale type extended a `'es' | 'en' | 'gn'`.
      · GN sparse dictionary, fallback a ES para keys faltantes.
      · Per-specialist: bio_gn, headline_gn opcionales.
