title: PyaServ abre las puertas — 40 zonas, gamification y guaraní
tldr: Listamos profesionales por barrio de Asunción y Departamento Central. Sumás XP y badges por trabajar bien. Y sí, el guaraní también juega.
sections:
  - kind: new
    heading: Buscá por tu zona
    body: |
      Elegí entre 40 zonas — los 25 barrios de Asunción más 15 distritos del Departamento Central. Filtrás los profesionales que están cerca tuyo, no los que están a una hora.
  - kind: new
    heading: Cubrís hasta 8 zonas
    body: |
      Si trabajás como profesional, marcá hasta 8 zonas donde llegás. Los clientes te ven solo cuando buscan en una zona que cubrís — sin perder tiempo con pedidos que te quedan lejos.
  - kind: new
    heading: Subís de nivel a medida que trabajás
    body: |
      Por cada trabajo terminado, cada review con foto, cada respuesta rápida — sumás XP. Cinco niveles para escalar: Aprendiz · Oficial · Maestro · Maestro Mayor · Patrón. El nivel se muestra en tu perfil público.
  - kind: new
    heading: 18 badges para destacar
    body: |
      Lográs medallas por hitos visibles para tus clientes: "Respuesta rápida", "10 trabajos terminados", "Top de tu barrio". Aparecen en tu perfil y te diferencian de la competencia.
  - kind: new
    heading: También en guaraní
    body: |
      Si querés, tu bio y headline pueden tener su versión en guaraní. Los clientes que prefieren guaraní te leen en su idioma. Opcional — escribilo solo si te suma.
