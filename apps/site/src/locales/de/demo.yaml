demo:
  banner_msg: 'DEMO-MODUS — Änderungen werden nicht gespeichert. Du siehst die echte App mit fiktiven Daten.'
  banner_exit: Demo verlassen
  exit_confirm_title: Demo-Modus verlassen
  exit_confirm_body: Nichts, was du ausprobiert hast, wird gespeichert. Dein echtes Profil (falls vorhanden) bleibt unverändert.
  exit_confirm_yes: Ja, verlassen
  exit_confirm_no: Im Demo bleiben
  demo_tag: Demo
  
  tour_t1_step1_title: Fangen wir mit deinem Gesicht an
  tour_t1_step1_body: Ein gutes Foto verdoppelt die Anfragen. Mach eins bei natürlichem Licht.
  tour_t1_step2_title: Deine Überschrift
  tour_t1_step2_body: 'Eine kurze Zeile: Beruf + Gebiet + Vorteil. Z.B.: "24h Klempner in Villa Morra".'
  tour_t1_step3_title: Wer bist du?
  tour_t1_step3_body: 2-3 Sätze. Deine Erfahrung, Werkzeuge, Gebiete die du abdeckst.
  tour_t1_step4_title: Deine Telefonnummer
  tour_t1_step4_body: Wie Kunden dich erreichen. Wenn möglich, dieselbe wie deine WhatsApp-Nummer.
  tour_t1_step5_title: WhatsApp
  tour_t1_step5_body: Der Hauptbutton deines Profils führt hierhin. Halte sie aktuell.
  tour_t1_step6_title: Dein Hauptviertel
  tour_t1_step6_body: Wo du am meisten arbeitest. Weitere Gebiete kannst du später hinzufügen.
  tour_t1_step7_title: Fertig!
  tour_t1_step7_body: Jeder Schritt erhöht deine Sichtbarkeit. Bei 100% schaltest du 7 Tage Boost und das "Master Profile"-Abzeichen frei!

  # Auto-tours per page
  tour_home_step1_title: "Willkommen bei PyaServ"
  tour_home_step1_body: "Wir verbinden Fachleute mit Kunden in Paraguay. Keine Kontaktgebühren."
  tour_home_step2_title: "Vier Sprachen, Sie wählen aus"
  tour_home_step2_body: "Wechseln Sie jederzeit oben zwischen Spanisch, Englisch, Deutsch und Russisch."
  tour_home_step3_title: "Sie sind im Demo-Modus"
  tour_home_step3_body: "Sie sehen Beispieldaten. Tippen Sie auf „Demo verlassen\", wenn Sie loslegen möchten."
  tour_specialists_step1_title: "Nach Stadtviertel oder Kategorie filtern"
  tour_specialists_step1_body: "Finden Sie Fachleute in Ihrer Nähe. Asunción und Departamento Central — 40 Zonen."
  tour_specialists_step2_title: "Tippen Sie eine Karte an, um das Profil zu öffnen"
  tour_specialists_step2_body: "Jedes Profil zeigt Foto, Bio, Leistungen und Auszeichnungen. Kontakt direkt über WhatsApp."
  tour_specialists_step3_title: "Sie sind im Demo-Modus"
  tour_specialists_step3_body: "Die angezeigten Fachleute sind Beispiele. Verlassen Sie die Demo, wenn Sie echt suchen möchten."
  tour_clients_step1_title: "Offene Anfragen nach Zone"
  tour_clients_step1_body: "Diese Kunden suchen gerade jemanden. Filtern Sie nach Stadtviertel oder Kategorie."
  tour_clients_step2_title: "Tippen Sie eine Anfrage an, um zu antworten"
  tour_clients_step2_body: "Wenn es passt, schreiben Sie direkt. Keine Filter, keine Gebühr für Bewerbungen."
  tour_clients_step3_title: "Sie sind im Demo-Modus"
  tour_clients_step3_body: "Die angezeigten Anfragen sind Beispiele. Verlassen Sie die Demo, um echt zu antworten."
  tour_profile_step1_title: "Öffentliches Profil zum Teilen"
  tour_profile_step1_body: "So sehen Kunden Sie, wenn Sie Ihren PyaServ-Link per WhatsApp schicken."
  tour_profile_step2_title: "Direkter Kontakt über WhatsApp"
  tour_profile_step2_body: "Ein Tipp und der Kunde schreibt Sie an — ohne Zwischenschritte, ohne Formulare."
  tour_profile_step3_title: "Leistungen, Bio und Auszeichnungen"
  tour_profile_step3_body: "Alles, was Kunden brauchen, um sich zu entscheiden. Jeden Bereich passen Sie selbst an."
