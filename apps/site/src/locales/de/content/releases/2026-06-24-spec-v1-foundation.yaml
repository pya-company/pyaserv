title: PyaServ öffnet seine Türen — 40 Zonen, Gamification und Guaraní
tldr: Wir listen Fachleute nach Stadtviertel in Asunción und Departamento Central. Sie sammeln XP und Abzeichen für gute Arbeit. Und ja, Guaraní spielt ebenfalls mit.
sections:
  - kind: new
    heading: Suchen Sie nach Ihrer Zone
    body: |
      Wählen Sie aus 40 Zonen — den 25 Stadtvierteln von Asunción und 15 Distrikten des Departamento Central. So filtern Sie Fachleute in Ihrer Nähe heraus, nicht solche, die eine Stunde entfernt sind.
  - kind: new
    heading: Bis zu 8 Zonen abdecken
    body: |
      Wenn Sie als Fachmann oder Fachfrau arbeiten, markieren Sie bis zu 8 Zonen, die Sie bedienen. Kundinnen und Kunden sehen Sie nur dann, wenn sie in einer Ihrer Zonen suchen — keine verschwendete Zeit mit Aufträgen, die zu weit weg liegen.
  - kind: new
    heading: Steigen Sie beim Arbeiten im Rang auf
    body: |
      Für jeden abgeschlossenen Auftrag, jede Bewertung mit Foto, jede schnelle Antwort sammeln Sie XP. Fünf Stufen zum Aufstieg: Lehrling · Geselle · Meister · Großmeister · Patron. Ihre Stufe erscheint in Ihrem öffentlichen Profil.
  - kind: new
    heading: 18 Abzeichen, um aufzufallen
    body: |
      Verdienen Sie Medaillen für sichtbare Meilensteine: "Schnelle Antwort", "10 Aufträge abgeschlossen", "Top in Ihrem Stadtviertel". Sie erscheinen in Ihrem Profil und heben Sie von der Konkurrenz ab.
  - kind: new
    heading: Auch auf Guaraní
    body: |
      Auf Wunsch können Ihre Biografie und Überschrift eine Guaraní-Version erhalten. Kundinnen und Kunden, die Guaraní bevorzugen, lesen Sie in ihrer Sprache. Optional — füllen Sie es nur aus, wenn es Ihnen etwas bringt.
