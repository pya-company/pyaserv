title: Die 13 Funktionen, die Sie brauchten — öffentliches Profil, Angebotsrechner, Demo und mehr
tldr: Per WhatsApp teilbares Profil, Angebote mit PDF, ein leichtes Kunden-CRM, geführte Tour, hyperlokale Suche und ein Demo-Modus, um sich vor der Anmeldung umzusehen.
sections:
  - kind: new
    heading: Öffentliches Profil, bereit zum Teilen
    body: |
      Jeder Fachmensch erhält den eigenen Link `/p/ihr-name` mit Foto, Titelbild, Biografie, Leistungen, Abzeichen, Öffnungszeiten und WhatsApp-Knopf. Sie fügen den Link in eine WhatsApp-Gruppe ein, und Kundinnen und Kunden sehen alles mit einer Berührung.
  - kind: new
    heading: Angebote mit PDF in einer Berührung
    body: |
      Sie stellen das Angebot mit Posten + IVA zusammen, laden das PDF herunter und schicken es direkt per WhatsApp an die Kundschaft. Ohne an den Schreibtisch zurückzukehren.
  - kind: new
    heading: Steigen Sie beim Arbeiten im Rang auf
    body: |
      XP für jeden abgeschlossenen Auftrag, Abzeichen für Meilensteine, eine tägliche Serie, die auch hält, wenn Sie sich einen Tag freinehmen. Fünf Stufen vom Lehrling bis zum Patron — die Kundschaft sieht es in Ihrem Profil.
  - kind: new
    heading: Ihre Kundschaft, gemerkt
    body: |
      Wenn Sie einen Auftrag abschließen, wird die Kundin oder der Kunde unter "Meine Kunden" gespeichert. Bearbeitbare Notizen, Auftragszähler. Demnächst: automatische Erinnerung, um Wartung anzubieten.
  - kind: new
    heading: Geführte Tour beim ersten Einstieg
    body: |
      Wenn Sie Ihr Profil gerade erst erstellt haben, führen wir Sie Schritt für Schritt durch das, was noch fehlt — ohne Handbücher zu lesen. Die Tour schließt sich von selbst, sobald Sie alles kennen.
  - kind: new
    heading: 400 lokale Seiten, damit man Sie auf Google findet
    body: |
      Wir erzeugen automatisch eine Seite pro Gewerk und Stadtviertel — "Klempner in Villa Morra", "Elektriker in Lambaré" — damit man Sie zuerst findet, wenn jemand auf Google sucht.
  - kind: new
    heading: Demo-Modus — schauen Sie vor der Anmeldung
    body: |
      Fügen Sie `?demo=1` an einen beliebigen Link an, und Sie durchstöbern die ganze App mit Beispieldaten, ohne ein Konto anzulegen. Für den Moment, in dem Sie aus einer WhatsApp-Gruppe kommen und wissen wollen, worum es geht.
